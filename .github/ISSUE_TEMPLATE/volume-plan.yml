name: Volume Plan
description: 発行Vol.のテーマと構成を決める
title: "Vol. 000: "
labels:
  - type:volume-plan
  - agent:editor-in-chief
  - kotatsu:ready
body:
  - type: input
    id: volume_number
    attributes:
      label: Volume number
      placeholder: "001"
    validations:
      required: true
  - type: input
    id: title
    attributes:
      label: Title
      placeholder: "創刊Vol.テーマ候補"
    validations:
      required: true
  - type: textarea
    id: concept
    attributes:
      label: Editorial concept
      description: このVol.で読者に残したい感覚を書く
    validations:
      required: true
  - type: textarea
    id: lineup
    attributes:
      label: Article lineup
      description: カバーストーリー、特集、LIFE、CULTURE、SHOPPINGなど
    validations:
      required: true