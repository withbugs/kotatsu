name: Article Task
description: 記事の企画、執筆、編集タスク
title: "[Vol. 000][ARTICLE] "
labels:
  - type:article
  - kotatsu:planned
body:
  - type: dropdown
    id: category
    attributes:
      label: Category
      options: [STYLE, LIFE, WEEKEND, CULTURE, PEOPLE, SHOPPING, COLUMN]
    validations:
      required: true
  - type: input
    id: volume
    attributes:
      label: Volume
      placeholder: "Vol. 001"
    validations:
      required: true
  - type: input
    id: approved_plan
    attributes:
      label: Approved plan on main
      placeholder: "docs/editorial/plans/vol-001.md"
    validations:
      required: true
  - type: input
    id: publication_schedule
    attributes:
      label: Publication date, week, or publishAt
      placeholder: "2026-07-20週 / 2026-07-24T13:00:00+09:00"
    validations:
      required: true
  - type: input
    id: working_title
    attributes:
      label: Working title
    validations:
      required: true
  - type: textarea
    id: brief
    attributes:
      label: Brief
      description: 記事の狙い、読後感、扱うもの、確認可能な事実を書く
    validations:
      required: true
  - type: textarea
    id: visual_notes
    attributes:
      label: AI visual brief
      description: 場面、発行時期、余白、hero、避ける要素。既存画像は指定しない
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Editorial checks
      options:
        - label: 承認済み正式計画がmainに存在する
          required: true
        - label: Vol.のテーマに沿い、服と生活がつながっている
          required: true
        - label: 商品紹介や煽りだけになっていない
          required: true
        - label: 撮影写真や既存画像ではなく、記事専用のAI生成ビジュアルを使う
          required: true
