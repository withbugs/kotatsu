name: Visual Task
description: AI生成ビジュアル、正式Vol.カバー、レイアウト、スクリーンショット確認
title: "[Vol. 000][VISUAL] "
labels:
  - type:visual
  - agent:visual-editor
  - kotatsu:planned
body:
  - type: dropdown
    id: target_type
    attributes:
      label: Target type
      options: [article-visual, volume-cover, page-visual, screenshot-check]
    validations:
      required: true
  - type: input
    id: target
    attributes:
      label: Target article, volume, or page
      placeholder: "article-slug / vol-002 / /"
    validations:
      required: true
  - type: input
    id: source
    attributes:
      label: Approved plan or article PR head branch
      placeholder: "docs/editorial/plans/vol-002.md / owner:branch"
    validations:
      required: true
  - type: textarea
    id: direction
    attributes:
      label: Visual direction
      description: 編集意図、構図、余白、色、見せ方
    validations:
      required: true
  - type: textarea
    id: seasonality
    attributes:
      label: Publication context
      description: 発行月、publishAt、日本の想定気候、見せる季節要素、避ける誤認
    validations:
      required: true
  - type: dropdown
    id: visual_mode
    attributes:
      label: Visual mode
      options: [photorealistic, illustration, collage, still-life]
    validations:
      required: true
  - type: textarea
    id: expected_outputs
    attributes:
      label: Expected outputs
      description: 画像、sidecar、frontmatter、スクリーンショットなどの具体的なパス
    validations:
      required: true
  - type: checkboxes
    id: ai_visual_rules
    attributes:
      label: AI visual rules
      options:
        - label: 撮影写真、ストックフォト、公式商品写真を使わない
          required: true
        - label: 実在人物、著名人、公開写真を顔の参照にしない
          required: true
        - label: 実在ブランドロゴ、実在店舗看板を生成しない
          required: true
        - label: 正式Vol.カバーではサンプル画像や記事heroを流用しない
          required: true
        - label: 画像生成または実画像確認ができなければ完成扱いにしない
          required: true
