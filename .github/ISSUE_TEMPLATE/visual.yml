name: Visual Task
description: AI生成ビジュアル、Vol.カバー、レイアウト、スクリーンショット確認
title: "[Visual] "
labels:
  - type:visual
  - agent:visual-editor
  - kotatsu:planned
body:
  - type: dropdown
    id: target_type
    attributes:
      label: Target type
      options:
        - article-visual
        - volume-cover
        - page-visual
        - screenshot-check
    validations:
      required: true
  - type: input
    id: target
    attributes:
      label: Target article, volume, or page
      description: "Examples: white-shirt-weekend-life, vol-001, /"
    validations:
      required: true
  - type: textarea
    id: direction
    attributes:
      label: Visual direction
      description: AI生成ビジュアルの方向、余白、色、見せ方。Vol.カバーでは正式計画のテーマ、サブコピー、カバー方針を含める。
    validations:
      required: true
  - type: dropdown
    id: visual_mode
    attributes:
      label: Visual mode
      options:
        - photorealistic
        - illustration
        - collage
        - still-life
    validations:
      required: true
  - type: textarea
    id: expected_outputs
    attributes:
      label: Expected outputs
      description: "For volume-cover: public/images/volumes/XXX/cover.png, sidecar JSON, and src/content/volumes/vol-XXX.md coverImage/coverAlt/visual updates."
    validations:
      required: false
  - type: checkboxes
    id: ai_visual_rules
    attributes:
      label: AI visual rules
      options:
        - label: 撮影写真、ストックフォト、公式商品写真を使わない
          required: true
        - label: すべての画像をAIで生成する
          required: true
        - label: 実在ブランドロゴ、実在店舗看板、著名人の顔を生成しない
          required: true
        - label: Vol.カバーではサンプル画像や記事heroを流用しない
          required: false
  - type: textarea
    id: screenshot_points
    attributes:
      label: Screenshot check points
      description: desktop/mobileで確認したい箇所
    validations:
      required: false
